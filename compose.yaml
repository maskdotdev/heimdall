services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: review-agent-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: review_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d review_agent"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: review-agent-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  object-storage:
    image: minio/minio:latest
    container_name: review-agent-object-storage
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: heimdall
      MINIO_ROOT_PASSWORD: heimdall-local-secret
    volumes:
      - object_storage_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  object-storage-init:
    image: minio/mc:latest
    container_name: review-agent-object-storage-init
    depends_on:
      object-storage:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        until mc alias set local http://object-storage:9000 heimdall heimdall-local-secret;
        do sleep 1; done;
        mc mb --ignore-existing local/heimdall-review-artifacts

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: review-agent-otel-collector
    profiles: ["observability"]
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
    volumes:
      - ./infra/observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      - tempo

  prometheus:
    image: prom/prometheus:latest
    container_name: review-agent-prometheus
    profiles: ["observability"]
    command: ["--config.file=/etc/prometheus/prometheus.yaml"]
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus_data:/prometheus

  tempo:
    image: grafana/tempo:latest
    container_name: review-agent-tempo
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"
    volumes:
      - ./infra/observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/tmp/tempo

  grafana:
    image: grafana/grafana:latest
    container_name: review-agent-grafana
    profiles: ["observability"]
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo

volumes:
  postgres_data:
  redis_data:
  object_storage_data:
  prometheus_data:
  tempo_data:
  grafana_data:
