services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: review-agent-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: review_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d review_agent"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: review-agent-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  object-storage:
    image: minio/minio:latest
    container_name: review-agent-object-storage
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: heimdall
      MINIO_ROOT_PASSWORD: heimdall-local-secret
    volumes:
      - object_storage_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  object-storage-init:
    image: minio/mc:latest
    container_name: review-agent-object-storage-init
    depends_on:
      object-storage:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        until mc alias set local http://object-storage:9000 heimdall heimdall-local-secret;
        do sleep 1; done;
        mc mb --ignore-existing local/heimdall-review-artifacts

volumes:
  postgres_data:
  redis_data:
  object_storage_data:
