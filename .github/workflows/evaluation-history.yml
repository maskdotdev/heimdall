name: evaluation-history

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: read

jobs:
  smoke-full-pipeline-history:
    name: Persist smoke eval history
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
          version: 10.33.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build eval persistence dependencies
        run: pnpm --filter @repo/evaluation... build

      - name: Run eval and optionally persist history
        env:
          EVAL_HISTORY_DATABASE_URL: ${{ secrets.EVAL_HISTORY_DATABASE_URL }}
        run: |
          if [ -z "$EVAL_HISTORY_DATABASE_URL" ]; then
            echo "EVAL_HISTORY_DATABASE_URL is not configured; running without persistence."
            pnpm eval:ci
            exit 0
          fi

          pnpm eval run \
            --suite smoke-full-pipeline-v1 \
            --variant scheduled \
            --no-live-models \
            --output-dir .tmp/eval-runs/smoke-full-pipeline-v1 \
            --clean-output \
            --database-url "$EVAL_HISTORY_DATABASE_URL" \
            --triggered-by github-actions.schedule \
            --history-environment scheduled-ci \
            --git-commit "$GITHUB_SHA" \
            --branch "$GITHUB_REF_NAME"

          pnpm eval compare \
            --baseline-report packages/evaluation/fixtures/smoke-full-pipeline-v1-baseline-report.json \
            --candidate-report .tmp/eval-runs/smoke-full-pipeline-v1/report.json \
            --output-file .tmp/eval-runs/smoke-full-pipeline-v1/comparison.md

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-smoke-full-pipeline-v1-eval-report
          if-no-files-found: warn
          path: |
            .tmp/eval-runs/smoke-full-pipeline-v1/report.md
            .tmp/eval-runs/smoke-full-pipeline-v1/report.html
            .tmp/eval-runs/smoke-full-pipeline-v1/report.json
            .tmp/eval-runs/smoke-full-pipeline-v1/report.junit.xml
            .tmp/eval-runs/smoke-full-pipeline-v1/comparison.md
