name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  control-plane-release-gates:
    name: Control-plane release gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: review_agent
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d review_agent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
          version: 10.33.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release gates
        env:
          HEIMDALL_DB_TEST_URL: postgres://postgres:postgres@localhost:5432/review_agent
        run: pnpm ci:control-plane:release

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-full-pipeline-v1-eval-report
          if-no-files-found: warn
          path: |
            .tmp/eval-runs/smoke-full-pipeline-v1/report.md
            .tmp/eval-runs/smoke-full-pipeline-v1/report.json
            .tmp/eval-runs/smoke-full-pipeline-v1/comparison.md
